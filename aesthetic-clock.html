<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aesthetic Clock</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&family=Syne:wght@400;500;600;700;800&family=Space+Grotesk:wght@300;400;500;600;700&family=Outfit:wght@200;300;400;500;600;700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=DM+Sans:wght@400;500;700&family=Manrope:wght@300;400;500;600;700;800&family=Be+Vietnam+Pro:wght@300;400;500;600;700&family=Figtree:wght@300;400;500;600;700&family=Nunito+Sans:wght@300;400;600;700&family=Cabinet+Grotesk:wght@400;500;700;800&family=Pacifico&family=Lobster&family=Satisfy&family=Great+Vibes&family=Alex+Brush&family=Dancing+Script:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Cormorant+Garamond:wght@300;400;500;600&family=Cinzel:wght@400;500;600;700&family=Sacramento&family=Yellowtail&family=Allura&family=Berkshire+Swash&family=Cookie&family=Tangerine:wght@400;700&family=Rochester&family=Monoton&family=Bungee&family=Bungee+Shade&family=Bebas+Neue&family=Fredoka:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f5f5f7;
      --card-bg: rgba(255, 255, 255, 0.72);
      --text: #1d1d1f;
      --text-secondary: #86868b;
      --accent: #0071e3;
      --accent-light: rgba(0, 113, 227, 0.1);
      --shadow: rgba(0, 0, 0, 0.08);
      --shadow-strong: rgba(0, 0, 0, 0.15);
      --glow-intensity: 0;
      --font-main: 'Inter';
      --border-radius: 40px;
      
      --ctrl-bg: rgba(255, 255, 255, 0.5);
      --ctrl-border: rgba(255, 255, 255, 0.6);
      --ctrl-btn-bg: rgba(255, 255, 255, 0.7);
      --ctrl-btn-border: rgba(0, 0, 0, 0.06);
      --ctrl-btn-hover: rgba(255, 255, 255, 0.95);
      --ctrl-slider-track: rgba(0, 0, 0, 0.1);
      --ctrl-dot-shadow: rgba(0, 0, 0, 0.08);
      --ctrl-dot-ring: white;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding-top: 40px;
      background: var(--bg);
      font-family: var(--font-main), -apple-system, sans-serif;
      padding-bottom: 60px;
      gap: 30px;
      transition: background 0.6s, color 0.4s;
    }

    .cursor-glow {
      position: fixed;
      width: 400px;
      height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, var(--accent-light) 0%, transparent 70%);
      pointer-events: none;
      z-index: 0;
      transform: translate(-50%, -50%);
      left: var(--mouse-x);
      top: var(--mouse-y);
      opacity: 0.6;
    }

    .cursor-ring {
      position: fixed;
      width: 30px;
      height: 30px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1000;
      transform: translate(-50%, -50%);
      left: var(--ring-x);
      top: var(--ring-y);
      transition: width 0.3s, height 0.3s, border-color 0.3s;
    }

    .cursor-dot {
      position: fixed;
      width: 6px;
      height: 6px;
      background: var(--accent);
      border-radius: 50%;
      pointer-events: none;
      z-index: 1001;
      transform: translate(-50%, -50%);
      left: var(--mouse-x);
      top: var(--mouse-y);
    }

    .bg-blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      pointer-events: none;
      z-index: 0;
      transition: background 0.8s;
    }
    .blob-1 { width: 600px; height: 600px; top: -200px; right: -100px; background: linear-gradient(135deg, #ffd6e8, #c7ceea); }
    .blob-2 { width: 500px; height: 500px; bottom: -150px; left: -100px; background: linear-gradient(135deg, #b8d4e3, #d4e8ed); }
    .blob-3 { width: 400px; height: 400px; top: 50%; left: 50%; transform: translate(-50%, -50%); background: linear-gradient(135deg, #e2d4f0, #d4e8ed); }

    .particles { position: fixed; inset: 0; pointer-events: none; z-index: 0; overflow: hidden; }
    .particle {
      position: absolute;
      width: 4px;
      height: 4px;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0.4;
      animation: particleFloat 8s ease-in-out infinite;
    }
    @keyframes particleFloat {
      0%, 100% { transform: translateY(0) scale(1); opacity: 0.2; }
      50% { transform: translateY(-100px) scale(1.5); opacity: 0.6; }
    }

    .main-container {
      position: relative;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      width: 100%;
      max-width: 600px;
      padding: 0 20px;
    }

    .clock-card {
      background: var(--card-bg);
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);
      border: 1px solid rgba(255, 255, 255, 0.6);
      border-radius: var(--border-radius);
      padding: 50px;
      box-shadow: 0 8px 32px var(--shadow), 0 32px 64px var(--shadow), inset 0 1px 1px rgba(255, 255, 255, 0.9);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 30px;
      width: 100%;
      max-width: 400px;
      transition: transform 0.3s, box-shadow 0.3s;
    }

    .clock-card:hover {
      transform: scale(1.02);
      box-shadow: 0 12px 40px var(--shadow-strong), 0 40px 80px var(--shadow);
    }

    .clock-wrapper {
      position: relative;
      width: 240px;
      height: 240px;
    }

    .clock-face {
      width: 100%;
      height: 100%;
      background: linear-gradient(180deg, rgba(255,255,255,0.9) 0%, rgba(255,255,255,0.5) 100%);
      border-radius: 50%;
      box-shadow: inset 0 2px 4px rgba(255,255,255,1), 0 4px 20px var(--shadow-strong);
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .clock-face::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.9), transparent 60%);
      pointer-events: none;
    }

    .glow-ring {
      position: absolute;
      inset: -4px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--accent), transparent, var(--accent));
      opacity: var(--glow-intensity);
      filter: blur(8px);
      animation: glowRotate 8s linear infinite;
    }
    @keyframes glowRotate { to { filter: hue-rotate(360deg); } }

    .inner-circle {
      position: relative;
      width: 190px;
      height: 190px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .hand {
      position: absolute;
      bottom: 50%;
      left: 50%;
      border-radius: 100px;
      transform-origin: bottom center;
      transition: transform 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    .hour-hand { width: 5px; height: 50px; background: var(--text); margin-left: -2.5px; z-index: 3; border-radius: 5px; }
    .minute-hand { width: 4px; height: 70px; background: var(--text); opacity: 0.7; margin-left: -2px; z-index: 4; border-radius: 4px; }
    .second-hand { width: 2px; height: 85px; background: var(--accent); margin-left: -1px; z-index: 5; border-radius: 2px; }
    .second-hand::after { content: ''; position: absolute; width: 8px; height: 8px; background: var(--accent); border-radius: 50%; bottom: -4px; left: 50%; transform: translateX(-50%); }

    .center-dot {
      position: absolute;
      top: 50%;
      left: 50%;
      width: 12px;
      height: 12px;
      background: var(--accent);
      border-radius: 50%;
      transform: translate(-50%, -50%);
      z-index: 6;
    }

    /* Clock Face Elements */
    .marker {
      position: absolute;
      width: 2px;
      height: 10px;
      background: var(--text-secondary);
      left: 50%;
      top: 12px;
      transform-origin: 50% 108px;
      border-radius: 1px;
      opacity: 0.4;
    }

    .numbers {
      position: absolute;
      inset: 0;
      font-size: 14px;
      font-weight: 500;
      color: var(--text);
    }
    .number-12 { position: absolute; top: 28px; left: 50%; transform: translateX(-50%); }
    .number-3 { position: absolute; right: 24px; top: 50%; transform: translateY(-50%); }
    .number-6 { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); }
    .number-9 { position: absolute; left: 24px; top: 50%; transform: translateY(-50%); }

    .roman {
      position: absolute;
      inset: 0;
      font-size: 12px;
      color: var(--text);
    }
    .roman-12 { position: absolute; top: 25px; left: 50%; transform: translateX(-50%); }
    .roman-3 { position: absolute; right: 18px; top: 50%; transform: translateY(-50%); }
    .roman-6 { position: absolute; bottom: 18px; left: 50%; transform: translateX(-50%); }
    .roman-9 { position: absolute; left: 18px; top: 50%; transform: translateY(-50%); }

    /* Abstract Faces */
    .face-artdeco {
      position: absolute;
      inset: 10px;
      border: 2px solid var(--accent);
      border-radius: 50%;
      opacity: 0.3;
    }

    .face-diamond .marker {
      width: 0;
      height: 0;
      background: transparent;
      border-left: 5px solid transparent;
      border-right: 5px solid transparent;
      border-bottom: 10px solid var(--text);
      top: 15px;
      transform-origin: 50% 105px;
    }

    .face-geometric {
      position: absolute;
      inset: 0;
    }

    .face-geometric::before,
    .face-geometric::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
    }

    .face-geometric::before {
      width: 160px;
      height: 160px;
      border: 1px solid var(--accent);
      border-radius: 50%;
      opacity: 0.3;
    }

    .face-geometric::after {
      width: 120px;
      height: 120px;
      border: 1px solid var(--text);
      transform: translate(-50%, -50%) rotate(45deg);
      opacity: 0.2;
    }

    .face-dots .marker {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      left: calc(50% - 3px);
      top: 15px;
      transform-origin: 50% 105px;
      opacity: 0.6;
    }

    .face-spiral {
      position: absolute;
      inset: 20px;
      border: 2px spiral var(--accent);
      border-radius: 50%;
      opacity: 0.3;
      border-style: dotted;
    }

    .face-wave {
      position: absolute;
      inset: 0;
    }

    .face-wave::before {
      content: '';
      position: absolute;
      top: 50%;
      left: 10%;
      right: 10%;
      height: 60px;
      transform: translateY(-50%);
      border: 1px solid var(--accent);
      border-radius: 50%;
      opacity: 0.2;
    }

    .face-triangle {
      position: absolute;
      inset: 30px;
      border: 1px solid var(--accent);
      opacity: 0.2;
      transform: rotate(45deg);
    }

    .face-hexagon {
      position: absolute;
      inset: 25px;
      clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%);
      border: 1px solid var(--accent);
      opacity: 0.3;
    }

    .time-display { font-size: var(--time-font-size, 52px); font-weight: 200; color: var(--text); letter-spacing: -1px; font-variant-numeric: tabular-nums; line-height: 1; transition: font-size 0.3s; }
    .time-display .colon { animation: colonPulse 1s ease-in-out infinite; margin: 0 2px; }
    @keyframes colonPulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    .date-display { font-size: 14px; color: var(--text-secondary); margin-top: 10px; }

    .controls-panel {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: 100%;
      max-width: 500px;
    }

    .control-section {
      background: var(--ctrl-bg);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--ctrl-border);
      border-radius: 24px;
      padding: 18px 22px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.3s;
    }
    .control-section:hover { transform: translateY(-2px); }

    .section-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 10px; }
    .section-title { font-size: 10px; font-weight: 500; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 2px; }
    .header-actions { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }

    .btn {
      background: var(--ctrl-btn-bg);
      border: 1px solid var(--ctrl-btn-border);
      border-radius: 14px;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.3s;
      white-space: nowrap;
    }
    .btn:hover { background: var(--ctrl-btn-hover); transform: translateY(-2px); }
    .btn:active { transform: scale(0.98); }
    .btn.active { background: var(--accent); color: white; border-color: var(--accent); }
    .btn.small { padding: 6px 12px; font-size: 11px; }

    .randomize-btn {
      background: linear-gradient(135deg, var(--accent), #a855f7);
      color: white;
      border: none;
      border-radius: 12px;
      padding: 8px 16px;
      font-size: 11px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.3s;
      font-family: inherit;
    }
    .randomize-btn:hover { transform: scale(1.05); }

    .control-row { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; }

    .theme-dot {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      border: none;
      cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 2px 8px var(--ctrl-dot-shadow);
    }
    .theme-dot:hover { transform: scale(1.15); }
    .theme-dot.active { transform: scale(1.1); box-shadow: 0 0 0 3px var(--ctrl-dot-ring), 0 4px 12px var(--shadow-strong); }
    .dot-blue { background: linear-gradient(135deg, #0071e3, #00a0f0); }
    .dot-purple { background: linear-gradient(135deg, #af52de, #ff6bcd); }
    .dot-pink { background: linear-gradient(135deg, #ff2d55, #ff6b8a); }
    .dot-green { background: linear-gradient(135deg, #34c759, #30d158); }
    .dot-orange { background: linear-gradient(135deg, #ff9f0a, #ffb340); }
    .dot-red { background: linear-gradient(135deg, #ff3b30, #ff6961); }
    .dot-indigo { background: linear-gradient(135deg, #5856d6, #7c7aff); }
    .dot-teal { background: linear-gradient(135deg, #00c7be, #30d158); }
    .dot-yellow { background: linear-gradient(135deg, #ffd60a, #ff9f0a); }
    .dot-slate { background: linear-gradient(135deg, #64748b, #94a3b8); }

    .color-input-wrapper {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--ctrl-btn-bg);
      border: 1px solid var(--ctrl-btn-border);
      border-radius: 14px;
      padding: 6px 12px;
    }

    input[type="color"] {
      width: 28px;
      height: 28px;
      border: none;
      border-radius: 50%;
      cursor: pointer;
      background: transparent;
      padding: 0;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
    input[type="color"]::-webkit-color-swatch { border: none; border-radius: 50%; }

    input[type="range"] {
      -webkit-appearance: none;
      width: 100px;
      height: 5px;
      background: var(--ctrl-slider-track);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: var(--accent);
      border-radius: 50%;
      cursor: pointer;
    }

    .slider-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--ctrl-btn-bg);
      border: 1px solid var(--ctrl-btn-border);
      border-radius: 14px;
      padding: 8px 12px;
    }
    .slider-wrapper label { font-size: 11px; color: var(--text); min-width: 40px; }

    select {
      background: var(--ctrl-btn-bg);
      border: 1px solid var(--ctrl-btn-border);
      border-radius: 14px;
      padding: 10px 14px;
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      cursor: pointer;
      outline: none;
    }
    select:hover { background: var(--ctrl-btn-hover); }

    .world-clock {
      text-align: center;
      padding: 10px 16px;
      background: var(--ctrl-btn-bg);
      border: 1px solid var(--ctrl-btn-border);
      border-radius: 14px;
      transition: transform 0.3s;
    }
    .world-clock:hover { transform: translateY(-2px); }
    .world-clock .city { font-size: 10px; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 4px; }
    .world-clock .time { font-size: 16px; font-weight: 300; color: var(--text); font-variant-numeric: tabular-nums; }

    .saved-presets { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; margin-top: 8px; }
    .saved-preset {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 12px;
      background: var(--ctrl-btn-bg);
      border: 1px solid var(--ctrl-btn-border);
      border-radius: 10px;
      font-size: 11px;
      color: var(--text);
      cursor: pointer;
      transition: all 0.3s;
    }
    .saved-preset:hover { background: var(--ctrl-btn-hover); transform: translateY(-2px); }
    .saved-preset .color-preview { width: 14px; height: 14px; border-radius: 50%; }
    .saved-preset .delete-btn { background: none; border: none; color: var(--text-secondary); cursor: pointer; padding: 0; font-size: 14px; opacity: 0.5; }
    .saved-preset .delete-btn:hover { opacity: 1; color: #ff3b30; }

    .fullscreen-btn {
      position: fixed;
      top: 20px;
      right: 20px;
      z-index: 100;
      background: var(--ctrl-btn-bg);
      border: 1px solid var(--ctrl-btn-border);
      border-radius: 14px;
      padding: 10px 16px;
      font-family: inherit;
      font-size: 12px;
      color: var(--text);
      cursor: pointer;
      backdrop-filter: blur(20px);
      transition: all 0.3s;
    }
    .fullscreen-btn:hover { background: var(--ctrl-btn-hover); transform: scale(1.05); }

    .fullscreen-overlay {
      position: fixed;
      inset: 0;
      background: var(--bg);
      z-index: 99;
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 30px;
    }
    .fullscreen-overlay.active { display: flex; }

    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 200;
      backdrop-filter: blur(5px);
    }
    .modal-overlay.active { display: flex; }
    .modal {
      background: var(--ctrl-bg);
      backdrop-filter: blur(40px);
      border: 1px solid var(--ctrl-border);
      border-radius: 24px;
      padding: 30px;
      max-width: 300px;
      width: 90%;
    }
    .modal h3 { margin-bottom: 20px; font-size: 16px; font-weight: 500; color: var(--text); }
    .modal input {
      width: 100%;
      padding: 12px 16px;
      background: var(--ctrl-btn-bg);
      border: 1px solid var(--ctrl-btn-border);
      border-radius: 12px;
      font-family: inherit;
      font-size: 14px;
      color: var(--text);
      outline: none;
      margin-bottom: 16px;
    }
    .modal input:focus { border-color: var(--accent); }
    .modal-actions { display: flex; gap: 10px; justify-content: flex-end; }

    @media (max-width: 500px) {
      .clock-card { padding: 30px; border-radius: 30px; }
      .control-section { padding: 14px 16px; border-radius: 20px; }
      .btn { padding: 8px 12px; font-size: 11px; }
      .time-display { font-size: 42px; }
      .clock-wrapper { width: 200px; height: 200px; }
      .inner-circle { width: 160px; height: 160px; }
      .hour-hand { height: 42px; }
      .minute-hand { height: 58px; }
      .second-hand { height: 72px; }
      .marker { transform-origin: 50% 90px; }
      .cursor-glow, .cursor-ring, .cursor-dot { display: none; }
    }
  </style>
</head>
<body>
  <div class="cursor-glow"></div>
  <div class="cursor-ring"></div>
  <div class="cursor-dot"></div>

  <div class="bg-blob blob-1" id="blob1"></div>
  <div class="bg-blob blob-2" id="blob2"></div>
  <div class="bg-blob blob-3" id="blob3"></div>
  <div class="particles" id="particles"></div>

  <div class="main-container">
    <div class="clock-card" id="clockCard">
      <div class="clock-wrapper" id="analogWrapper">
        <div class="glow-ring"></div>
        <div class="clock-face" id="clockFace">
          <div class="face-container" id="faceContainer">
            <div class="marker" style="transform: rotate(0deg)"></div>
            <div class="marker" style="transform: rotate(30deg)"></div>
            <div class="marker" style="transform: rotate(60deg)"></div>
            <div class="marker" style="transform: rotate(90deg)"></div>
            <div class="marker" style="transform: rotate(120deg)"></div>
            <div class="marker" style="transform: rotate(150deg)"></div>
            <div class="marker" style="transform: rotate(180deg)"></div>
            <div class="marker" style="transform: rotate(210deg)"></div>
            <div class="marker" style="transform: rotate(240deg)"></div>
            <div class="marker" style="transform: rotate(270deg)"></div>
            <div class="marker" style="transform: rotate(300deg)"></div>
            <div class="marker" style="transform: rotate(330deg)"></div>
            <div class="numbers" id="numbersFace">
              <span class="number-12">12</span>
              <span class="number-3">3</span>
              <span class="number-6">6</span>
              <span class="number-9">9</span>
            </div>
            <div class="roman" id="romanFace" style="display:none">
              <span class="roman-12">XII</span>
              <span class="roman-3">III</span>
              <span class="roman-6">VI</span>

  <script>
    const hourHand = document.getElementById('hourHand');
    const minuteHand = document.getElementById('minuteHand');
    const secondHand = document.getElementById('secondHand');
    const hoursEl = document.getElementById('hours');
    const minutesEl = document.getElementById('minutes');
    const secondsEl = document.getElementById('seconds');
    const secWrapper = document.getElementById('secWrapper');
    const dateDisplay = document.getElementById('dateDisplay');
    const particles = document.getElementById('particles');
    const analogWrapper = document.getElementById('analogWrapper');
    const digitalWrapper = document.getElementById('digitalWrapper');
    const faceContainer = document.getElementById('faceContainer');

    let settings = {
      use24h: true,
      showSeconds: true,
      accent: '#0071e3',
      clockFace: 'numbers',
      displayMode: 'both',
      ctrlTheme: 'light',
      cursorGlow: 0.6,
      fullscreen: false,
      font: "'Inter'",
      borderRadius: 40,
      fontSize: 52
    };

    let savedPresets = JSON.parse(localStorage.getItem('clockPresets') || '[]');

    let mouseX = window.innerWidth / 2, mouseY = window.innerHeight / 2;
    let ringX = mouseX, ringY = mouseY;

    document.addEventListener('mousemove', (e) => {
      mouseX = e.clientX;
      mouseY = e.clientY;
      document.documentElement.style.setProperty('--mouse-x', mouseX + 'px');
      document.documentElement.style.setProperty('--mouse-y', mouseY + 'px');
    });

    function animateCursor() {
      ringX += (mouseX - ringX) * 0.15;
      ringY += (mouseY - ringY) * 0.15;
      document.documentElement.style.setProperty('--ring-x', ringX + 'px');
      document.documentElement.style.setProperty('--ring-y', ringY + 'px');
      requestAnimationFrame(animateCursor);
    }
    animateCursor();

    const worldCities = [
      { name: 'NY', offset: -5 },
      { name: 'London', offset: 0 },
      { name: 'Paris', offset: 1 },
      { name: 'Dubai', offset: 4 },
      { name: 'Tokyo', offset: 9 },
      { name: 'Sydney', offset: 10 }
    ];

    const presets = {
      midnight: { bg: '#0a0a0f', card: 'rgba(20, 20, 30, 0.85)', text: '#ffffff', secondary: '#8888aa', accent: '#6366f1', blob1: 'linear-gradient(135deg, #6366f1, #8b5cf6)', blob2: 'linear-gradient(135deg, #3b0764, #581c87)', blob3: 'linear-gradient(135deg, #1e1b4b, #312e81)' },
      sunrise: { bg: '#fef3e2', card: 'rgba(255, 255, 255, 0.8)', text: '#3d2c1f', secondary: '#8b7355', accent: '#f97316', blob1: 'linear-gradient(135deg, #fbbf24, #f97316)', blob2: 'linear-gradient(135deg, #fecaca, #fee2e2)', blob3: 'linear-gradient(135deg, #fed7aa, #fdba74)' },
      aurora: { bg: '#0d1117', card: 'rgba(20, 30, 40, 0.85)', text: '#e0f2fe', secondary: '#64748b', accent: '#22d3ee', blob1: 'linear-gradient(135deg, #22d3ee, #34d399)', blob2: 'linear-gradient(135deg, #a78bfa, #c084fc)', blob3: 'linear-gradient(135deg, #f472b6, #fb7185)' },
      neon: { bg: '#0d0015', card: 'rgba(20, 0, 30, 0.9)', text: '#e0e0ff', secondary: '#8080aa', accent: '#00ffcc', blob1: 'linear-gradient(135deg, #ff00ff, #00ffff)', blob2: 'linear-gradient(135deg, #7c3aed, #ec4899)', blob3: 'linear-gradient(135deg, #00ff88, #00aaff)' },
      pastel: { bg: '#fef9f3', card: 'rgba(255, 255, 255, 0.75)', text: '#5c4b3a', secondary: '#a89585', accent: '#e879a9', blob1: 'linear-gradient(135deg, #ffd6e8, #c7ceea)', blob2: 'linear-gradient(135deg, #b8d4e3, #d4e8ed)', blob3: 'linear-gradient(135deg, #e2d4f0, #f0d4e2)' }
    };

    const bgPresets = {
      light: { bg: '#f5f5f7', blob1: 'linear-gradient(135deg, #ffd6e8, #c7ceea)', blob2: 'linear-gradient(135deg, #b8d4e3, #d4e8ed)', blob3: 'linear-gradient(135deg, #e2d4f0, #d4e8ed)' },
      dark: { bg: '#1a1a1c', blob1: 'linear-gradient(135deg, #3a3a4a, #2a2a3a)', blob2: 'linear-gradient(135deg, #2a3a4a, #1a2a3a)', blob3: 'linear-gradient(135deg, #3a2a4a, #2a1a3a)' },
      gradient: { bg: '#667eea', blob1: 'linear-gradient(135deg, #764ba2, #667eea)', blob2: 'linear-gradient(135deg, #f093fb, #f5576c)', blob3: 'linear-gradient(135deg, #4facfe, #00f2fe)' },
      sunset: { bg: '#1a0a2e', blob1: 'linear-gradient(135deg, #ff6b35, #f7931e)', blob2: 'linear-gradient(135deg, #c84b31, #ec5569)', blob3: 'linear-gradient(135deg, #662e9b, #ea3546)' },
      ocean: { bg: '#0a1628', blob1: 'linear-gradient(135deg, #0077b6, #00b4d8)', blob2: 'linear-gradient(135deg, #023e8a, #0096c7)', blob3: 'linear-gradient(135deg, #48cae4, #90e0ef)' },
      forest: { bg: '#0a1f0a', blob1: 'linear-gradient(135deg, #2d6a4f, #40916c)', blob2: 'linear-gradient(135deg, #1b4332, #2d6a4f)', blob3: 'linear-gradient(135deg, #52b788, #74c69d)' },
      nord: { bg: '#2e3440', blob1: 'linear-gradient(135deg, #5e81ac, #81a1c1)', blob2: 'linear-gradient(135deg, #4c566a, #5e81ac)', blob3: 'linear-gradient(135deg, #88c0d0, #8fbcbb)' },
      dracula: { bg: '#282a36', blob1: 'linear-gradient(135deg, #bd93f9, #ff79c6)', blob2: 'linear-gradient(135deg, #6272a4, #44475a)', blob3: 'linear-gradient(135deg, #ff5555, #f1fa8c)' }
    };

    const ctrlThemes = {
      light: { bg: 'rgba(255,255,255,0.5)', border: 'rgba(255,255,255,0.6)', btnBg: 'rgba(255,255,255,0.7)', btnBorder: 'rgba(0,0,0,0.06)', btnHover: 'rgba(255,255,255,0.95)', sliderTrack: 'rgba(0,0,0,0.1)', dotShadow: 'rgba(0,0,0,0.08)', dotRing: 'white' },
      dark: { bg: 'rgba(20,20,25,0.7)', border: 'rgba(60,60,70,0.5)', btnBg: 'rgba(40,40,50,0.8)', btnBorder: 'rgba(80,80,90,0.3)', btnHover: 'rgba(60,60,70,0.9)', sliderTrack: 'rgba(255,255,255,0.15)', dotShadow: 'rgba(0,0,0,0.3)', dotRing: 'rgba(40,40,50,0.9)' }
    };

    function createParticles(container) {
      for (let i = 0; i < 15; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.animationDuration = (6 + Math.random() * 4) + 's';
        container.appendChild(p);
      }
    }

    function setAccent(color, btn) {
      if (btn) {
        document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
        btn.classList.add('active');
      }
      settings.accent = color;
      document.documentElement.style.setProperty('--accent', color);
      document.documentElement.style.setProperty('--accent-light', color + '1a');
      document.querySelectorAll('.particle').forEach(p => p.style.background = color);
    }

    function setDisplayMode(mode) {
      settings.displayMode = mode;
      document.querySelectorAll('.control-section:nth-child(2) .btn').forEach(b => {
        if (b.onclick.toString().includes('setDisplayMode')) b.classList.remove('active');
      });
      event.target.classList.add('active');
      analogWrapper.style.display = mode === 'digital' ? 'none' : 'flex';
      digitalWrapper.style.display = mode === 'analog' ? 'none' : 'block';
    }

    function setClockFace(face) {
      settings.clockFace = face;
      document.querySelectorAll('.control-section:nth-child(2) .btn').forEach(b => {
        if (b.onclick.toString().includes('setClockFace')) b.classList.remove('active');
      });
      event.target.classList.add('active');

      faceContainer.innerHTML = '';
      faceContainer.className = 'face-container face-' + face;

      const markers = [];
      for (let i = 0; i < 12; i++) {
        const m = document.createElement('div');
        m.className = 'marker';
        m.style.transform = `rotate(${i * 30}deg)`;
        markers.push(m);
      }
      faceContainer.append(...markers);

      if (face === 'numbers') {
        faceContainer.innerHTML += `
          <div class="numbers">
            <span class="number-12">12</span>
            <span class="number-3">3</span>
            <span class="number-6">6</span>
            <span class="number-9">9</span>
          </div>`;
      } else if (face === 'roman') {
        faceContainer.innerHTML += `
          <div class="roman">
            <span class="roman-12">XII</span>
            <span class="roman-3">III</span>
            <span class="roman-6">VI</span>
            <span class="roman-9">IX</span>
          </div>`;
      } else if (face === 'diamond') {
        markers.forEach(m => {
          m.style.width = '0';
          m.style.height = '0';
          m.style.background = 'transparent';
          m.style.borderLeft = '5px solid transparent';
          m.style.borderRight = '5px solid transparent';
          m.style.borderBottom = '10px solid var(--text)';
          m.style.top = '15px';
          m.style.transformOrigin = '50% 105px';
        });
      } else if (face === 'dots') {
        markers.forEach(m => {
          m.style.width = '6px';
          m.style.height = '6px';
          m.style.borderRadius = '50%';
          m.style.background = 'var(--accent)';
          m.style.left = 'calc(50% - 3px)';
          m.style.top = '15px';
          m.style.transformOrigin = '50% 105px';
          m.style.opacity = '0.6';
        });
      } else if (face === 'geometric') {
        faceContainer.innerHTML = `
          <div class="face-geometric"></div>
          <div class="marker" style="transform: rotate(0deg)"></div>
          <div class="marker" style="transform: rotate(30deg)"></div>
          <div class="marker" style="transform: rotate(60deg)"></div>
          <div class="marker" style="transform: rotate(90deg)"></div>
          <div class="marker" style="transform: rotate(120deg)"></div>
          <div class="marker" style="transform: rotate(150deg)"></div>
          <div class="marker" style="transform: rotate(180deg)"></div>
          <div class="marker" style="transform: rotate(210deg)"></div>
          <div class="marker" style="transform: rotate(240deg)"></div>
          <div class="marker" style="transform: rotate(270deg)"></div>
          <div class="marker" style="transform: rotate(300deg)"></div>
          <div class="marker" style="transform: rotate(330deg)"></div>
          <div class="numbers">
            <span class="number-12">12</span>
            <span class="number-3">3</span>
            <span class="number-6">6</span>
            <span class="number-9">9</span>
          </div>`;
      } else if (face === 'hexagon') {
        faceContainer.innerHTML = `
          <div class="face-hexagon"></div>
          <div class="marker" style="transform: rotate(0deg)"></div>
          <div class="marker" style="transform: rotate(30deg)"></div>
          <div class="marker" style="transform: rotate(60deg)"></div>
          <div class="marker" style="transform: rotate(90deg)"></div>
          <div class="marker" style="transform: rotate(120deg)"></div>
          <div class="marker" style="transform: rotate(150deg)"></div>
          <div class="marker" style="transform: rotate(180deg)"></div>
          <div class="marker" style="transform: rotate(210deg)"></div>
          <div class="marker" style="transform: rotate(240deg)"></div>
          <div class="marker" style="transform: rotate(270deg)"></div>
          <div class="marker" style="transform: rotate(300deg)"></div>
          <div class="marker" style="transform: rotate(330deg)"></div>
          <div class="numbers">
            <span class="number-12">12</span>
            <span class="number-3">3</span>
            <span class="number-6">6</span>
            <span class="number-9">9</span>
          </div>`;
      } else if (face === 'minimal') {
        markers.forEach(m => m.style.opacity = '0');
      }

      updateFullscreenFace();
    }

    function updateFullscreenFace() {
      const fsFaceContainer = document.getElementById('fsFaceContainer');
      fsFaceContainer.innerHTML = faceContainer.innerHTML;
    }

    function toggleSeconds(btn) {
      btn.classList.toggle('active');
      settings.showSeconds = btn.classList.contains('active');
      secWrapper.style.display = settings.showSeconds ? 'inline' : 'none';
      document.getElementById('fsSecWrapper').style.display = settings.showSeconds ? 'inline' : 'none';
    }

    function toggleGlow(btn) {
      btn.classList.toggle('active');
      document.documentElement.style.setProperty('--glow-intensity', btn.classList.contains('active') ? '1' : '0');
    }

    function setBorderRadius(val) {
      settings.borderRadius = val;
      document.documentElement.style.setProperty('--border-radius', val + 'px');
    }

    function setCursorGlow(val) {
      settings.cursorGlow = val;
      document.querySelector('.cursor-glow').style.opacity = val;
    }

    function setFontSize(val) {
      settings.fontSize = val;
      document.documentElement.style.setProperty('--time-font-size', val + 'px');
    }

    function setFont(font) {
      settings.font = font;
      document.documentElement.style.setProperty('--font-main', font);
    }

    function setBgPreset(preset) {
      const p = bgPresets[preset];
      document.documentElement.style.setProperty('--bg', p.bg);
      document.getElementById('blob1').style.background = p.blob1;
      document.getElementById('blob2').style.background = p.blob2;
      document.getElementById('blob3').style.background = p.blob3;
    }

    function toggleCtrlTheme() {
      settings.ctrlTheme = settings.ctrlTheme === 'light' ? 'dark' : 'light';
      const btn = document.getElementById('ctrlThemeBtn');
      btn.textContent = settings.ctrlTheme === 'light' ? '🌙' : '☀️';
      const t = ctrlThemes[settings.ctrlTheme];
      document.documentElement.style.setProperty('--ctrl-bg', t.bg);
      document.documentElement.style.setProperty('--ctrl-border', t.border);
      document.documentElement.style.setProperty('--ctrl-btn-bg', t.btnBg);
      document.documentElement.style.setProperty('--ctrl-btn-border', t.btnBorder);
      document.documentElement.style.setProperty('--ctrl-btn-hover', t.btnHover);
      document.documentElement.style.setProperty('--ctrl-slider-track', t.sliderTrack);
      document.documentElement.style.setProperty('--ctrl-dot-shadow', t.dotShadow);
      document.documentElement.style.setProperty('--ctrl-dot-ring', t.dotRing);
    }

    function applyPreset(name) {
      const p = presets[name];
      document.documentElement.style.setProperty('--bg', p.bg);
      document.documentElement.style.setProperty('--card-bg', p.card);
      document.documentElement.style.setProperty('--text', p.text);
      document.documentElement.style.setProperty('--text-secondary', p.secondary);
      document.getElementById('blob1').style.background = p.blob1;
      document.getElementById('blob2').style.background = p.blob2;
      document.getElementById('blob3').style.background = p.blob3;
      setAccent(p.accent, null);
      document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
    }

    function toggleFullscreen() {
      settings.fullscreen = !settings.fullscreen;
      const overlay = document.getElementById('fullscreenOverlay');
      overlay.classList.toggle('active', settings.fullscreen);

      if (settings.fullscreen) {
        document.getElementById('fsBlob1').style.background = document.getElementById('blob1').style.background || getComputedStyle(document.getElementById('blob1')).background;
        document.getElementById('fsBlob2').style.background = document.getElementById('blob2').style.background || getComputedStyle(document.getElementById('blob2')).background;
        document.getElementById('fsBlob3').style.background = document.getElementById('blob3').style.background || getComputedStyle(document.getElementById('blob3')).background;
        const container = document.getElementById('fsParticles');
        container.innerHTML = '';
        createParticles(container);
        
        document.getElementById('fsAnalogWrapper').style.display = analogWrapper.style.display;
        document.getElementById('fsDigitalWrapper').style.display = digitalWrapper.style.display;
        document.getElementById('fsSecWrapper').style.display = settings.showSeconds ? 'inline' : 'none';
        updateFullscreenFace();
      }
    }

    function openSaveModal() {
      document.getElementById('saveModal').classList.add('active');
      document.getElementById('presetName').value = '';
      document.getElementById('presetName').focus();
    }

    function closeSaveModal() {
      document.getElementById('saveModal').classList.remove('active');
    }

    function savePreset() {
      const name = document.getElementById('presetName').value.trim();
      if (!name) return;
      const preset = {
        name,
        accent: settings.accent,
        bg: getComputedStyle(document.documentElement).getPropertyValue('--bg'),
        blob1: document.getElementById('blob1').style.background,
        blob2: document.getElementById('blob2').style.background,
        blob3: document.getElementById('blob3').style.background,
        text: getComputedStyle(document.documentElement).getPropertyValue('--text'),
        textSecondary: getComputedStyle(document.documentElement).getPropertyValue('--text-secondary'),
        card: getComputedStyle(document.documentElement).getPropertyValue('--card-bg'),
        font: settings.font,
        clockFace: settings.clockFace,
        displayMode: settings.displayMode,
        showSeconds: settings.showSeconds,
        glowIntensity: document.getElementById('glowIntensity')?.value || '1',
        borderRadius: settings.borderRadius || 40,
        fontSize: settings.fontSize || 52
      };
      savedPresets.push(preset);
      localStorage.setItem('clockPresets', JSON.stringify(savedPresets));
      renderSavedPresets();
      closeSaveModal();
    }

    function deletePreset(index) {
      savedPresets.splice(index, 1);
      localStorage.setItem('clockPresets', JSON.stringify(savedPresets));
      renderSavedPresets();
    }

    function applySavedPreset(index) {
      const p = savedPresets[index];
      document.documentElement.style.setProperty('--bg', p.bg);
      document.documentElement.style.setProperty('--card-bg', p.card);
      document.documentElement.style.setProperty('--text', p.text);
      document.documentElement.style.setProperty('--text-secondary', p.textSecondary);
      document.getElementById('blob1').style.background = p.blob1;
      document.getElementById('blob2').style.background = p.blob2;
      document.getElementById('blob3').style.background = p.blob3;
      setAccent(p.accent, null);
      
      if (p.font) {
        setFont(p.font);
        document.getElementById('fontSelect').value = p.font;
        settings.font = p.font;
      }
      
      if (p.clockFace) {
        setClockFace(p.clockFace);
      }
      
      if (p.displayMode) {
        setDisplayModeDirect(p.displayMode);
      }
      
      if (p.showSeconds !== undefined) {
        settings.showSeconds = p.showSeconds;
        secWrapper.style.display = p.showSeconds ? 'inline' : 'none';
        document.getElementById('fsSecWrapper').style.display = p.showSeconds ? 'inline' : 'none';
        const secBtn = document.querySelector('[onclick*="toggleSeconds"]');
        if (secBtn) secBtn.classList.toggle('active', p.showSeconds);
      }
      
      if (p.borderRadius) {
        settings.borderRadius = p.borderRadius;
        document.documentElement.style.setProperty('--border-radius', p.borderRadius + 'px');
      }
      
      if (p.fontSize) {
        settings.fontSize = p.fontSize;
        document.documentElement.style.setProperty('--time-font-size', p.fontSize + 'px');
      }
    }

    function setDisplayModeDirect(mode) {
      settings.displayMode = mode;
      analogWrapper.style.display = mode === 'digital' ? 'none' : 'flex';
      digitalWrapper.style.display = mode === 'analog' ? 'none' : 'block';
      document.querySelectorAll('.control-section:nth-child(2) .btn').forEach(b => {
        if (b.onclick.toString().includes('setDisplayMode')) {
          b.classList.remove('active');
          if (b.textContent.toLowerCase().includes(mode)) b.classList.add('active');
        }
      });
    }

    function renderSavedPresets() {
      const container = document.getElementById('savedPresets');
      if (savedPresets.length === 0) {
        container.innerHTML = '<span style="font-size:11px;color:var(--text-secondary)">No saved presets</span>';
        return;
      }
      container.innerHTML = savedPresets.map((p, i) => `
        <div class="saved-preset" onclick="applySavedPreset(${i})">
          <span class="color-preview" style="background:${p.accent}"></span>
          <span>${p.name}</span>
          <button class="delete-btn" onclick="event.stopPropagation();deletePreset(${i})">×</button>
        </div>
      `).join('');
    }

    function randomize() {
      const colors = ['#0071e3','#af52de','#ff2d55','#34c759','#ff9f0a','#ff3b30','#5856d6','#00c7be','#ffd60a','#64748b','#00ffcc'];
      const fonts = ["'Inter'", "'Pacifico'", "'Lobster'", "'Satisfy'", "'Great Vibes'", "'Dancing Script'", "'Playfair Display'", "'Fredoka'", "'Syne'"];
      const bgs = Object.keys(bgPresets);
      const faces = ['numbers', 'markers', 'roman', 'minimal', 'diamond', 'dots', 'geometric', 'hexagon'];
      
      setAccent(colors[Math.floor(Math.random() * colors.length)], document.querySelector('.theme-dot'));
      setBgPreset(bgs[Math.floor(Math.random() * bgs.length)]);
      const randomFont = fonts[Math.floor(Math.random() * fonts.length)];
      setFont(randomFont);
      document.getElementById('fontSelect').value = randomFont;
      setClockFace(faces[Math.floor(Math.random() * faces.length)]);
      setBorderRadius(Math.floor(Math.random() * 9) * 10);
      setFontSize(Math.floor(Math.random() * 6) * 10 + 36);
      document.querySelectorAll('.theme-dot').forEach(d => d.classList.remove('active'));
    }

    function updateWorldClocks() {
      const container = document.getElementById('worldClocks');
      container.innerHTML = worldCities.map(city => {
        const now = new Date();
        const utc = now.getTime() + (now.getTimezoneOffset() * 60000);
        const target = new Date(utc + (3600000 * city.offset));
        return `<div class="world-clock"><div class="city">${city.name}</div><div class="time">${target.getHours().toString().padStart(2,'0')}:${target.getMinutes().toString().padStart(2,'0')}</div></div>`;
      }).join('');
    }

    function updateClock() {
      const now = new Date();
      const h = now.getHours();
      const m = now.getMinutes();
      const s = now.getSeconds();
      const ms = now.getMilliseconds();

      const ss = s + ms / 1000;
      const sm = m + ss / 60;
      const sh = (h % 12) + sm / 60;

      const secDeg = ss * 6;
      const minDeg = sm * 6;
      const hrDeg = sh * 30;

      hourHand.style.transform = `rotate(${hrDeg}deg)`;
      minuteHand.style.transform = `rotate(${minDeg}deg)`;
      secondHand.style.transform = `rotate(${secDeg}deg)`;

      const fsHour = document.getElementById('fsHourHand');
      const fsMin = document.getElementById('fsMinuteHand');
      const fsSec = document.getElementById('fsSecondHand');
      if (fsHour) fsHour.style.transform = `rotate(${hrDeg}deg)`;
      if (fsMin) fsMin.style.transform = `rotate(${minDeg}deg)`;
      if (fsSec) fsSec.style.transform = `rotate(${secDeg}deg)`;

      const displayH = settings.use24h ? h : h % 12 || 12;
      hoursEl.textContent = displayH.toString().padStart(2, '0');
      minutesEl.textContent = m.toString().padStart(2, '0');
      secondsEl.textContent = s.toString().padStart(2, '0');

      const fsH = document.getElementById('fsHours');
      const fsM = document.getElementById('fsMinutes');
      const fsS = document.getElementById('fsSeconds');
      if (fsH) fsH.textContent = displayH.toString().padStart(2, '0');
      if (fsM) fsM.textContent = m.toString().padStart(2, '0');
      if (fsS) fsS.textContent = s.toString().padStart(2, '0');

      const days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
      const months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
      dateDisplay.textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;
      const fsDate = document.getElementById('fsDateDisplay');
      if (fsDate) fsDate.textContent = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

      requestAnimationFrame(updateClock);
    }

    document.addEventListener('keydown', (e) => {
      if (e.key === 'Escape' && settings.fullscreen) toggleFullscreen();
      if (e.key === 'f' || e.key === 'F') toggleFullscreen();
    });

    createParticles(particles);
    renderSavedPresets();
    updateWorldClocks();
    setInterval(updateWorldClocks, 60000);
    updateClock();
    setClockFace('numbers');
  </script>
</body>
</html>
